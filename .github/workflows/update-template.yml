# Update Template CI — Hu
#
# Upptime regenera workflows desde el template y SOBRESCRIBE site.yml (peaceiris), rompiendo
# el deploy con actions/deploy-pages. Por eso el schedule semanal está desactivado.
# Si ejecutás este workflow a mano, volvé a commitear .github/workflows/site.yml con deploy-pages.
#
# Upptime @v1.41.0 (job original conservado para workflow_dispatch / repository_dispatch)

name: Update Template CI

on:
  repository_dispatch:
    types: [update_template]
  workflow_dispatch:

jobs:
  release:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Update template
        uses: upptime/uptime-monitor@master
        with:
          command: "update-template"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
