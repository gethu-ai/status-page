# Hu — Upptime: https://upptime.js.org/docs/configuration
owner: gethu-ai
repo: status-page

sites:
  - name: Hu
    url: https://gethu.ai
    icon: https://gethu.ai/brand/white-green.png
    expectedStatusCodes:
      - 200
      - 403
  - name: Hu Thread
    url: https://thread.gethu.ai
    icon: https://thread.gethu.ai/icon-512.png
    expectedStatusCodes:
      - 200
      - 403
  - name: Hu Central
    url: https://central.gethu.ai
    icon: https://central.gethu.ai/icon-512.png
    expectedStatusCodes:
      - 200
      - 403
  - name: Hu Agents
    url: https://agents.gethu.ai
    icon: https://gethu.ai/brand/white-green.png
    expectedStatusCodes:
      - 200
      - 403

status-website:
  cname: status.gethu.ai
  theme: light
  # Tras el deploy, también en https://status.gethu.ai/hu-status.css
  themeUrl: https://cdn.jsdelivr.net/gh/gethu-ai/status-page@master/assets/hu-status.css
  logoUrl: https://gethu.ai/brand/white-green.png
  favicon: https://gethu.ai/favicon.png
  name: Hu Status
  introTitle: "**Estado de los servicios Hu**"
  introMessage: Disponibilidad de **Hu** (web), **Thread** (inbox), **Central** (admin) y **Agents**. Actualizado con [Upptime](https://github.com/$OWNER/$REPO) · GitHub Actions + Pages.
  navbar:
    - title: Inicio
      href: /
    - title: Repositorio
      href: https://github.com/$OWNER/$REPO
    - title: gethu.ai
      href: https://gethu.ai
  metaTags:
    - name: theme-color
      content: "#00C16A"
    - name: description
      content: Estado en vivo de Hu, Thread y Central.
  # Barras de disponibilidad (90 d) + CSS en hu-status.css
  customHeadHtml: '<script defer src="https://cdn.jsdelivr.net/gh/gethu-ai/status-page@master/assets/hu-uptime-bars.js"></script>'

