# Static Site CI — Hu (gethu-ai/status-page)
#
# Upptime upstream usa peaceiris (rama gh-pages). Con Pages → origen "GitHub Actions"
# hace falta deploy-pages. Update Template CI upstream pisa este archivo: ver update-template.yml.
#
# Basado en Upptime @v1.41.0

name: Static Site CI

on:
  schedule:
    - cron: "0 1 * * *"
  repository_dispatch:
    types: [static_site]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  release:
    name: Build and deploy site
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Generate site
        uses: upptime/uptime-monitor@v1.41.0
        with:
          command: "site"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/status-page/__sapper__/export

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
